<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>js시작하기</h1>
    <p>개발자 도구의 console창을 확인하세요</p>
    <button class="btn">클릭하세요!</button>
    <!-- 자바스크립트 코드 작성 -->
    <script>
      console.log("==자바스크립트 시작하기==");

      // 변수 선언
      const a = 1;
      const b = 2;
      console.log(a + b);

      //버튼에 함수 연결
      const btn = document.querySelector(".btn");
      console.log(btn);
      btn.addEventListener("click", () => {
        alert("hi");
      });
    </script>
  </body>
</html>
