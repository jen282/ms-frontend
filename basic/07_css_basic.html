<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 내부 스타일시트 -->
    <style>
      /* 태그 선택자 */
      p {
        font-style: italic;
      }

      /* 클래스 선택자 */
      .pink {
        background-color: pink;
      }
      .skyblue {
        background-color: skyblue;
      }
      .yellow {
        background-color: yellow;
      }

      /* id 선택자 */

      /* 복핪 선택자 */
    </style>

    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Song+Myung&display=swap"
      rel="stylesheet"
    />

    <!-- 프리탠다드 폰트 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h3>인라인 스타일</h3>
    <p style="color: red; background-color: yellow">빨간글자</p>
    <p style="color: blue">파란글자</p>
    <p style="color: green">초록글자</p>

    <h3>내부 스타일시트</h3>
    <!-- 클래스 선택자 -->
    <p class="pink">핑크배경</p>
    <p class="skyblue">하늘배경</p>
    <p class="yellow">노란배경</p>

    <!-- id 선택자 -->

    <h3>외부 스타일시트</h3>
    <p class="css black-han-sans-regular">
      외부스타일시트로 스타일을 만듭니다.
    </p>
    <p class="css song-myung-regular">외부스타일시트로 스타일을 만듭니다.</p>
    <p class="css">외부스타일시트로 스타일을 만듭니다.</p>
  </body>
</html>
